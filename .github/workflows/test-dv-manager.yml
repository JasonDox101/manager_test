name: Test dv.manager 3.1.0 compile

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: test-dv-manager-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: dv.manager on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          rtools-version: "45"
          use-public-rspm: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev libssl-dev libxml2-dev git

      - name: Print environment
        run: |
          Rscript -e "cat('OS:', Sys.info()[['sysname']], '\n')"
          Rscript -e "cat('R:', R.version$version.string, '\n')"
          Rscript -e "cat('R_LIBS_USER:', Sys.getenv('R_LIBS_USER'), '\n')"

      - name: Install pak
        run: |
          Rscript -e "lib <- Sys.getenv('R_LIBS_USER'); dir.create(lib, recursive = TRUE, showWarnings = FALSE); install.packages('pak', lib = lib)"
          Rscript -e "stopifnot(requireNamespace('pak', quietly = TRUE)); cat('pak installed OK\n')"

      - name: Install dv.manager from GitHub (latest release)
        run: |
          Rscript -e "pak::pak('Boehringer-Ingelheim/dv.manager', ask = FALSE)"
          Rscript -e "cat('Installed dv.manager version:', as.character(packageVersion('dv.manager')), '\n')"
          Rscript -e "cat('Install path:', find.package('dv.manager'), '\n')"

      - name: Smoke test load
        run: Rscript -e "library(dv.manager); cat('dv.manager loaded OK\n')"
